name: CI

on:
  push:
    branches: [master, beta]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'docker-compose.yml'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 前端类型检查与构建 / Frontend type-check & build ────────────────────────
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm i
        working-directory: frontend

      - name: Type-check & build
        run: npm run build
        working-directory: frontend

  # ── 桌面端类型检查 / Desktop type-check (vue-tsc + modules) ─────────────────
  check-desktop:
    name: Check desktop (type-check + modules)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm i
        working-directory: desktop

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libssl-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> ../../../build_tmp/desktop/target
          key: desktop-ci

      - name: Run desktop check
        run: node scripts/check.desktop.js
        env:
          CHECK_NESTED: "1"
          CARGO_TARGET_DIR: build_tmp/desktop/target

  # ── 服务器端检查 / Server check + clippy ──────────────────────────────────
  check-server:
    name: Check server
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> ../build_tmp/backend/target
          key: server-ci

      # RustEmbed 要求 dist 目录存在 / RustEmbed requires the dist directory to exist
      - name: Ensure build_tmp/frontend/dist exists
        run: mkdir -p build_tmp/frontend/dist

      - name: Check
        run: cargo check --manifest-path backend/Cargo.toml
        env:
          CARGO_TARGET_DIR: build_tmp/backend/target

      - name: Clippy
        run: cargo clippy --manifest-path backend/Cargo.toml -- -D warnings
        env:
          CARGO_TARGET_DIR: build_tmp/backend/target

  # ── 模块检查 / Modules check + clippy ───────────────────────────────────────
  check-modules:
    name: Check modules
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            modules/contact_sheet -> ../../build_tmp/modules/contact_sheet/target
            modules/filter_short -> ../../build_tmp/modules/filter_short/target
            modules/notify_discord -> ../../build_tmp/modules/notify_discord/target
            modules/notify_telegram -> ../../build_tmp/modules/notify_telegram/target
            modules/pp_utils -> ../../build_tmp/modules/pp_utils/target
          key: modules-ci

      - name: Check all modules
        run: |
          for module_dir in modules/contact_sheet modules/filter_short modules/notify_discord modules/notify_telegram modules/pp_utils; do
            if [ -f "$module_dir/Cargo.toml" ]; then
              echo "=== Checking $module_dir ==="
              cargo check --manifest-path "$module_dir/Cargo.toml"
              cargo clippy --manifest-path "$module_dir/Cargo.toml" -- -D warnings
            fi
          done

  # ── 桌面端构建 / Desktop build (Linux) ──────────────────────────────────────
  build-desktop:
    name: Build desktop (Linux)
    runs-on: ubuntu-22.04
    needs: [check-desktop, check-modules]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm i
        working-directory: desktop

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config build-essential libssl-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> ../../../build_tmp/desktop/target
            modules/contact_sheet -> ../../build_tmp/modules/contact_sheet/target
            modules/filter_short -> ../../build_tmp/modules/filter_short/target
            modules/notify_discord -> ../../build_tmp/modules/notify_discord/target
            modules/notify_telegram -> ../../build_tmp/modules/notify_telegram/target
            modules/pp_utils -> ../../build_tmp/modules/pp_utils/target
          key: desktop-release

      - name: Full desktop release build
        run: node scripts/release.desktop.js
        env:
          CARGO_TARGET_DIR: build_tmp/desktop/target

  # ── 服务器端构建 / Server build (Linux) ───────────────────────────────────
  build-server:
    name: Build server  (Linux)
    runs-on: ubuntu-22.04
    needs: [frontend, check-server, check-modules]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm i
        working-directory: frontend

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> ../build_tmp/backend/target
          key: server-release

      - name: Full release build
        run: node scripts/release.js

  # ── 自动打 Tag / Auto-tag after CI (master only) ─────────────────────────────
  #
  # 仅在 master 分支且所有构建通过后运行。
  # 从 package.json 读取版本号，若对应 tag 不存在则创建并推送，
  # 从而自动触发 release.yml 工作流。
  #
  # Only runs on master after all builds pass.
  # Reads version from package.json; creates and pushes the tag if it doesn't
  # exist yet, which in turn triggers the release.yml workflow.
  auto-tag:
    name: Auto-tag release
    runs-on: ubuntu-22.04
    needs: [build-server, build-desktop]
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/beta') && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 使用 PAT checkout，确保后续 push 也携带同一凭据
          # Checkout with PAT so the subsequent push uses the same credential
          token: ${{ secrets.RELEASE_PAT }}

      # 从 package.json 读取版本号并构造 tag / Read version from package.json and build tag name
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # 若 tag 已存在则跳过，避免重复发布 / Skip if tag already exists to avoid duplicate releases
      - name: Check if tag exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 用 PAT 推送 tag，绕过 GITHUB_TOKEN 不触发下游 workflow 的限制
      # Push tag with PAT to bypass the GITHUB_TOKEN cross-workflow trigger restriction
      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
