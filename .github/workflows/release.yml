name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # Build main binary + all modules per platform
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64

          - name: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Rust toolchain ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            modules/contact_sheet
            modules/filter_short
            modules/notify_discord
            modules/notify_telegram
            modules/pp_utils
          key: ${{ matrix.target }}

      # ── Linux: system libraries ──
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libpango1.0-dev \
            libcairo2-dev libgdk-pixbuf-xlib-2.0-dev libsoup-3.0-dev \
            pkg-config build-essential libssl-dev

      # ── Build main binary ──
      - name: Build Tauri binary
        run: npx tauri build --no-bundle --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Build modules ──
      - name: Build modules (Unix)
        if: runner.os != 'Windows'
        run: |
          for module_dir in modules/contact_sheet modules/filter_short modules/notify_discord modules/notify_telegram; do
            if [ -f "$module_dir/Cargo.toml" ]; then
              echo "Building $module_dir..."
              cargo build --manifest-path "$module_dir/Cargo.toml" \
                --release --bins --target ${{ matrix.target }}
            fi
          done

      - name: Build modules (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($mod in @("modules/contact_sheet","modules/filter_short","modules/notify_discord","modules/notify_telegram")) {
            if (Test-Path "$mod/Cargo.toml") {
              Write-Host "Building $mod..."
              cargo build --manifest-path "$mod/Cargo.toml" --release --bins --target ${{ matrix.target }}
            }
          }

      # ── Assemble package directory ──
      #
      # Layout:
      #   stripchat-recorder-{platform}/
      #   ├── stripchat-recorder(.exe)
      #   └── modules/
      #       ├── contact_sheet_v020(.exe)
      #       └── ...
      #
      - name: Assemble package (Unix)
        if: runner.os != 'Windows'
        run: |
          PKG="stripchat-recorder-${{ matrix.artifact_suffix }}"
          mkdir -p "$PKG/modules"

          # Main binary
          cp "src-tauri/target/${{ matrix.target }}/release/stripchat-recorder" "$PKG/"
          chmod +x "$PKG/stripchat-recorder"

          # Module binaries
          for module_dir in modules/contact_sheet modules/filter_short modules/notify_discord modules/notify_telegram; do
            find "$module_dir/target/${{ matrix.target }}/release" \
              -maxdepth 1 -type f -executable \
              ! -name '*.d' ! -name '*.rlib' ! -name '*.rmeta' \
              -exec cp {} "$PKG/modules/" \;
          done

          echo "=== Package contents ==="
          find "$PKG" -type f | sort

          # Archive
          tar -czf "${PKG}.tar.gz" "$PKG"

      - name: Assemble package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "stripchat-recorder-${{ matrix.artifact_suffix }}"
          New-Item -ItemType Directory -Force -Path "$pkg/modules" | Out-Null

          # Main binary
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/stripchat-recorder.exe" "$pkg/"

          # Module binaries
          foreach ($mod in @("modules/contact_sheet","modules/filter_short","modules/notify_discord","modules/notify_telegram")) {
            Get-ChildItem "$mod/target/${{ matrix.target }}/release/*.exe" -ErrorAction SilentlyContinue |
              Copy-Item -Destination "$pkg/modules/"
          }

          Write-Host "=== Package contents ==="
          Get-ChildItem -Recurse $pkg | Select-Object FullName

          # Archive
          Compress-Archive -Path $pkg -DestinationPath "${pkg}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stripchat-recorder-${{ matrix.artifact_suffix }}
          path: stripchat-recorder-${{ matrix.artifact_suffix }}.*
          retention-days: 7

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List release assets
        run: ls -lh artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: artifacts/*
