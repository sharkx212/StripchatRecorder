name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 主程序构建（多平台）/ Server build (multi-platform) ──────────────────────
  build-server:
    name: Build server (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-22.04
            artifact-name: StripchatRecorder-server-linux-x86_64
            archive-name: StripchatRecorder-server-linux-x86_64.zip
          - platform: windows-x86_64
            os: windows-latest
            artifact-name: StripchatRecorder-server-windows-x86_64
            archive-name: StripchatRecorder-server-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm i
        working-directory: frontend

      # ── Rust 工具链 / Rust toolchain ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> ../build_tmp/backend/target
            modules/contact_sheet -> ../../build_tmp/modules/contact_sheet/target
            modules/filter_short -> ../../build_tmp/modules/filter_short/target
            modules/notify_discord -> ../../build_tmp/modules/notify_discord/target
            modules/notify_telegram -> ../../build_tmp/modules/notify_telegram/target
            modules/pp_utils -> ../../build_tmp/modules/pp_utils/target
          key: server-${{ matrix.platform }}

      # ── 系统依赖（仅 Linux）/ System libraries (Linux only) ──
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libssl-dev

      # ── 构建 / Build ──
      - name: Full release build
        run: node scripts/release.js

      # ── 打包（Linux）/ Assemble package (Linux) ──
      - name: Assemble package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          PKG="${{ matrix.artifact-name }}"
          mkdir -p "$PKG"
          cp -r build/. "$PKG/"
          echo "=== Package contents ==="
          find "$PKG" -type f | sort
          zip -r "${{ matrix.archive-name }}" "$PKG"

      # ── 打包（Windows）/ Assemble package (Windows) ──
      - name: Assemble package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $PKG = "${{ matrix.artifact-name }}"
          New-Item -ItemType Directory -Force -Path $PKG | Out-Null
          Copy-Item -Recurse build\* $PKG\
          Write-Host "=== Package contents ==="
          Get-ChildItem -Recurse $PKG | Select-Object FullName
          Compress-Archive -Path $PKG -DestinationPath "${{ matrix.archive-name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.archive-name }}
          retention-days: 7

  # ── 桌面端构建（多平台）/ Desktop build (multi-platform) ────────────────────
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-22.04
            artifact-name: StripchatRecorder-desktop-linux-x86_64
          - platform: windows-x86_64
            os: windows-latest
            artifact-name: StripchatRecorder-desktop-windows-x86_64
          - platform: macos-aarch64
            os: macos-latest
            artifact-name: StripchatRecorder-desktop-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm i
        working-directory: desktop

      # ── Rust 工具链 / Rust toolchain ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (desktop)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> ../../../build_tmp/desktop/target
            modules/contact_sheet -> ../../build_tmp/modules/contact_sheet/target
            modules/filter_short -> ../../build_tmp/modules/filter_short/target
            modules/notify_discord -> ../../build_tmp/modules/notify_discord/target
            modules/notify_telegram -> ../../build_tmp/modules/notify_telegram/target
            modules/pp_utils -> ../../build_tmp/modules/pp_utils/target
          key: desktop-${{ matrix.platform }}

      # ── 平台系统依赖 / Platform-specific system dependencies ──
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config build-essential libssl-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS system dependencies
        if: startsWith(matrix.os, 'macos')
        run: brew install pkg-config

      # ── 构建 / Build ──
      - name: Full desktop release build
        run: node scripts/release.desktop.js
        env:
          CARGO_TARGET_DIR: build_tmp/desktop/target

      # ── 打包模块 / Pack modules ──
      - name: Pack modules (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          zip -j build/desktop/modules-${{ matrix.platform }}.zip build/desktop/modules/*

      - name: Pack modules (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path build\desktop\modules\* `
            -DestinationPath build\desktop\modules-${{ matrix.platform }}.zip

      # ── 上传 Linux 产物 / Upload Linux artifacts ──
      - name: Upload Linux installers
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            build/desktop/appimage/*.AppImage
            build/desktop/deb/*.deb
            build/desktop/rpm/*.rpm
            build/desktop/modules-${{ matrix.platform }}.zip
          retention-days: 7

      # ── 上传 macOS 产物 / Upload macOS artifacts ──
      - name: Upload macOS installers
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            build/desktop/dmg/*.dmg
            build/desktop/modules-${{ matrix.platform }}.zip
          retention-days: 7

      # ── 上传 Windows 产物 / Upload Windows artifacts ──
      - name: Upload Windows installers
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            build/desktop/msi/*.msi
            build/desktop/nsis/*.exe
            build/desktop/modules-${{ matrix.platform }}.zip
          retention-days: 7

  # ── 创建 GitHub Release / Create GitHub Release ──────────────────────────────
  release:
    name: Create Release
    needs: [build-server, build-desktop]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List release assets
        run: ls -lhR artifacts/

      # tag 始终来自 push 事件 / Tag always comes from the push event
      - name: Determine tag
        id: tag
        run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: artifacts/**/*
