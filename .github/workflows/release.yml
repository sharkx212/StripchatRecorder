name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # Build main binary + all modules (Linux only)
  # ─────────────────────────────────────────────
  build:
    name: Build (linux-x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Rust toolchain ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            modules/contact_sheet
            modules/filter_short
            modules/notify_discord
            modules/notify_telegram
            modules/pp_utils

      # ── System libraries ──
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libpango1.0-dev \
            libcairo2-dev libgdk-pixbuf-xlib-2.0-dev libsoup-3.0-dev \
            pkg-config build-essential libssl-dev

      # ── Build main binary ──
      - name: Build Tauri binary
        run: npx tauri build --no-bundle --debug

      # ── Build modules ──
      - name: Build modules
        run: |
          for module_dir in modules/contact_sheet modules/filter_short modules/notify_discord modules/notify_telegram; do
            if [ -f "$module_dir/Cargo.toml" ]; then
              echo "Building $module_dir..."
              cargo build --manifest-path "$module_dir/Cargo.toml" --bins
            fi
          done

      # ── Assemble package directory ──
      #
      # Layout:
      #   stripchat-recorder-linux-x86_64/
      #   ├── stripchat-recorder
      #   └── modules/
      #       └── ...
      #
      - name: Assemble package
        run: |
          PKG="stripchat-recorder-linux-x86_64"
          mkdir -p "$PKG/modules"

          # Main binary
          cp "src-tauri/target/debug/stripchat-recorder" "$PKG/"
          chmod +x "$PKG/stripchat-recorder"

          # Module binaries
          for module_dir in modules/contact_sheet modules/filter_short modules/notify_discord modules/notify_telegram; do
            find "$module_dir/target/debug" \
              -maxdepth 1 -type f -executable \
              ! -name '*.d' ! -name '*.rlib' ! -name '*.rmeta' \
              -exec cp {} "$PKG/modules/" \;
          done

          echo "=== Package contents ==="
          find "$PKG" -type f | sort

          # Archive
          tar -czf "${PKG}.tar.gz" "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stripchat-recorder-linux-x86_64
          path: stripchat-recorder-linux-x86_64.tar.gz
          retention-days: 7

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List release assets
        run: ls -lh artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: artifacts/*
